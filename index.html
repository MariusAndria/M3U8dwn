<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M3U8 Downloader PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
    background: linear-gradient(135deg,#0f0f0f,#1a1a1a);
    color:#fff;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.container{
    width:420px;
    padding:30px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    box-shadow:0 0 40px rgba(0,255,150,0.2);
    text-align:center;
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(20px)}
    to{opacity:1;transform:translateY(0)}
}

.logo{
    width:90px;
    height:90px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:15px;
    box-shadow:0 0 20px #00ff88;
}

h1{
    font-size:20px;
    margin-bottom:20px;
}

input,select{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin:10px 0;
    background:#111;
    color:#fff;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#00ff88,#00ccff);
    color:#000;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.progress{
    margin-top:20px;
    width:100%;
    height:12px;
    background:#222;
    border-radius:10px;
    overflow:hidden;
}

.bar{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#00ff88,#00ccff);
    transition:0.3s;
}

.status{
    margin-top:10px;
    font-size:14px;
    opacity:0.8;
}

.footer{
    margin-top:15px;
    font-size:12px;
    opacity:0.5;
}

</style>
</head>
<body>

<div class="container">

<img src="logo.webp" class="logo">

<h1>🎬 Downloader M3U8</h1>

<input type="text" id="url" placeholder="Colle ton lien .m3u8">

<select id="quality">
    <option value="best">🔥 1080p (Qualité max)</option>
    <option value="worst">⚡ 720p (Rapide)</option>
</select>

<button onclick="startDownload()">⬇️ Télécharger</button>

<div class="progress">
    <div class="bar" id="bar"></div>
</div>

<div class="status" id="status">En attente...</div>

<div class="footer">Powered by Marius ⚡</div>

</div>

<script>
function startDownload(){
    let url = document.getElementById("url").value;
    let quality = document.getElementById("quality").value;

    document.getElementById("status").innerText = "⏳ Téléchargement...";

    fetch("download.php",{
        method:"POST",
        headers:{"Content-Type":"application/x-www-form-urlencoded"},
        body:"url="+encodeURIComponent(url)+"&quality="+quality
    });

    let interval = setInterval(()=>{
        fetch("progress.php")
        .then(res=>res.text())
        .then(p=>{
            document.getElementById("bar").style.width = p+"%";
            document.getElementById("status").innerText = p+"%";

            if(p>=100){
                clearInterval(interval);
                document.getElementById("status").innerText = "✅ Terminé !";
            }
        })
    },1000);
}
</script>

</body>
</html>
